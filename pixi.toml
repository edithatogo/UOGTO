[workspace]
name = "uogto"
version = "0.1.0"
description = "Universal Open Game Theory Ontology"
authors = ["UOGTO Contributors"]
channels = ["conda-forge"]
platforms = ["win-64", "linux-64"]

[dependencies]
python = ">=3.10"
rdflib = ">=7.0.0"
pyshacl = ">=0.25.0"
pytest = ">=8.0.0"
pyyaml = ">=6.0.1"
jsonschema = ">=4.0.0"
ruff = ">=0.3.0"

[tasks]
build = "python scripts/build.py"
test = "pytest"
validate = "make validate"
audit-semantics = "python scripts/maintenance/audit_semantics.py"
html-report = "python scripts/maintenance/generate_html_report.py"
publishing-metadata = "python scripts/maintenance/check_publishing_metadata.py"
check = "python scripts/validate.py && pytest && python scripts/maintenance/audit_semantics.py && python scripts/maintenance/generate_html_report.py && python scripts/maintenance/check_publishing_metadata.py"
