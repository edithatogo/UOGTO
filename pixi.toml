[workspace]
name = "uogto"
version = "0.1.0"
description = "Universal Open Game Theory Ontology"
authors = ["UOGTO Contributors"]
channels = ["conda-forge"]
platforms = ["win-64", "linux-64"]

[dependencies]
python = ">=3.10"
rdflib = ">=7.0.0"
pyshacl = ">=0.25.0"
pytest = ">=8.0.0"
pyyaml = ">=6.0.1"
jsonschema = ">=4.0.0"
ruff = ">=0.3.0"

[tasks]
build = "python scripts/build.py"
test = "pytest"
validate = "make validate"
audit-semantics = "python scripts/maintenance/audit_semantics.py"
html-report = "python scripts/maintenance/generate_html_report.py"
publishing-metadata = "python scripts/maintenance/check_publishing_metadata.py"
registry-links = "python scripts/maintenance/check_registry_links.py"
registry-links-live = "python scripts/maintenance/check_registry_links.py --live --allow-unpublished"
manuscript-sources = "python scripts/maintenance/build_manuscript_sources.py"
release-assets = "python scripts/build.py && python scripts/maintenance/package_release_assets.py"
check = "python scripts/validate.py && pytest && python scripts/maintenance/audit_semantics.py && python scripts/maintenance/generate_html_report.py && python scripts/maintenance/check_publishing_metadata.py && python scripts/maintenance/check_registry_links.py && python scripts/build.py && python scripts/maintenance/package_release_assets.py"

manuscript-sourcecheck = "python scripts/maintenance/build_manuscript_sources.py && sourceright validate-csl --json docs/paper/references.csl.json && sourceright report .sourceright && sourceright citations docs/paper/manuscript-citations.txt .sourceright"
