[workspace]
name = "uogto"
version = "1.0.0"
description = "Universal Open Game Theory Ontology"
authors = ["UOGTO Contributors"]
channels = ["conda-forge"]
platforms = ["win-64", "linux-64"]

[dependencies]
python = "3.10.*"
rdflib = ">=7.0.0"
pyshacl = ">=0.25.0"
pytest = ">=8.0.0"
pyyaml = ">=6.0.1"
jsonschema = ">=4.0.0"
ruff = ">=0.3.0"
textstat = ">=0.7.13,<0.8"

[tasks]
build = "python scripts/build.py"
test = "python scripts/build.py && pytest"
validate = "make validate"
audit-semantics = "python scripts/maintenance/audit_semantics.py"
jsonld-context-coverage = "python scripts/maintenance/update_jsonld_context_coverage.py"
html-report = "python scripts/maintenance/generate_html_report.py"
publishing-metadata = "python scripts/maintenance/check_publishing_metadata.py"
registry-links = "python scripts/maintenance/check_registry_links.py"
registry-links-live = "python scripts/maintenance/check_registry_links.py --live"
registry-packet = "python scripts/maintenance/build_registry_handoff.py"
extended-registry-packet = "python scripts/maintenance/build_extended_registry_handoff.py"
ontology-comparison-inventory = "python scripts/maintenance/build_ontology_comparison_inventory.py"
ontology-comparison-harvest = "python scripts/maintenance/harvest_comparison_sources.py"
ontology-comparison-terms = "python scripts/maintenance/extract_comparison_terms.py"
ontology-comparison-mappings = "python scripts/maintenance/generate_ontology_mapping_candidates.py"
ontology-comparison-alignments = "python scripts/maintenance/build_comparison_alignments.py"
ontology-comparison-sssom = "python scripts/maintenance/build_comparison_alignments.py"
ontology-comparison-overlap = "python scripts/maintenance/analyse_ontology_overlap.py"
ontology-comparison-networks = "python scripts/maintenance/analyse_ontology_networks.py"
ontology-comparison-visuals = "python scripts/maintenance/visualise_ontology_comparison.py"
ontology-comparison-check = "python scripts/maintenance/check_ontology_comparison_artifacts.py"
ontology-comparison-all = "python scripts/maintenance/build_ontology_comparison_inventory.py && python scripts/maintenance/harvest_comparison_sources.py && python scripts/maintenance/extract_comparison_terms.py && python scripts/maintenance/generate_ontology_mapping_candidates.py && python scripts/maintenance/build_comparison_alignments.py && python scripts/maintenance/analyse_ontology_overlap.py && python scripts/maintenance/analyse_ontology_networks.py && python scripts/maintenance/visualise_ontology_comparison.py && python scripts/maintenance/check_ontology_comparison_artifacts.py"
article-hardening-protocol = "python scripts/maintenance/check_article_hardening_protocol.py"
article-hardening-inventory = "python scripts/maintenance/build_article_hardening_inventory.py"
article-hardening-source-acquisition = "python scripts/maintenance/build_article_source_acquisition_manifest.py"
article-hardening-quality = "python scripts/maintenance/build_article_hardening_quality.py"
article-hardening-robot = "python scripts/maintenance/build_article_hardening_robot_reports.py"
article-hardening-figures = "python scripts/maintenance/render_article_hardening_figures.py"
article-hardening-tabular = "python scripts/maintenance/export_tabular_artifacts.py && python scripts/maintenance/build_article_evidence_tables.py && python scripts/maintenance/build_candidate_decision_ledger.py"
article-hardening-duckdb = "python scripts/maintenance/build_article_hardening_duckdb.py"
article-hardening-dashboard = "pixi run article-hardening-duckdb && pixi run article-hardening-tabular && pixi run article-hardening-figures && python scripts/maintenance/build_article_evidence_dashboard.py"
article-hardening-all = "pixi run article-hardening-inventory && pixi run article-hardening-source-acquisition && pixi run article-hardening-quality && pixi run article-hardening-robot && pixi run article-hardening-tabular && pixi run article-hardening-figures && pixi run article-hardening-dashboard && pixi run article-hardening-protocol"
zenodo-packet = "python scripts/maintenance/build_zenodo_handoff.py"
zenodo-depositions = "python scripts/maintenance/check_zenodo_depositions.py"
w3id-packet = "python scripts/maintenance/build_w3id_redirect_handoff.py"
publication-status = "python scripts/maintenance/build_publication_status.py"
publication-status-live = "python scripts/maintenance/build_publication_status.py --live --output dist/publication-status-live.json"
w3id-status = "python scripts/maintenance/check_w3id_status.py"
w3id-status-live = "python scripts/maintenance/check_w3id_status.py --live"
doi-status = "python scripts/maintenance/check_doi_status.py"
doi-status-live = "python scripts/maintenance/check_doi_status.py --live"
record-doi = "python scripts/maintenance/record_zenodo_doi.py"
manuscript-sources = "python scripts/maintenance/build_manuscript_sources.py"
release-assets = "python scripts/build.py && python scripts/maintenance/package_release_assets.py"
release-preflight = "python scripts/build.py && python scripts/maintenance/package_release_assets.py && python scripts/maintenance/build_registry_handoff.py && python scripts/maintenance/build_extended_registry_handoff.py && python scripts/maintenance/build_zenodo_handoff.py && python scripts/maintenance/build_w3id_redirect_handoff.py && python scripts/maintenance/build_publication_status.py && python scripts/maintenance/check_release_readiness.py"
check = "pixi run required-gate && python scripts/maintenance/audit_semantics.py && python scripts/maintenance/generate_html_report.py && python scripts/maintenance/check_w3id_status.py && python scripts/maintenance/check_doi_status.py && python scripts/maintenance/package_release_assets.py && python scripts/maintenance/check_release_readiness.py"

manuscript-sourcecheck = "python scripts/maintenance/build_manuscript_sources.py && python scripts/maintenance/check_manuscript_citations.py && python scripts/maintenance/build_manuscript_pdf.py && sourceright validate-csl --json docs/paper/references.csl.json && sourceright report .sourceright && sourceright citations docs/paper/manuscript-citations.txt .sourceright"
arxiv-source-package = "python scripts/maintenance/build_manuscript_sources.py && python scripts/maintenance/build_arxiv_source_package.py"
arxiv-source-clean = "python scripts/maintenance/build_manuscript_sources.py && python scripts/maintenance/build_arxiv_source_package.py && python scripts/maintenance/clean_arxiv_source_package.py"
arxiv-preflight = "python scripts/maintenance/build_manuscript_sources.py && python scripts/maintenance/check_manuscript_citations.py && python scripts/maintenance/build_manuscript_pdf.py --output-dir .tmp/manuscript-build-arxiv --require-pdf && python scripts/maintenance/build_arxiv_source_package.py && python scripts/maintenance/clean_arxiv_source_package.py && python scripts/maintenance/audit_arxiv_source_privacy.py && sourceright validate-csl --json docs/paper/references.csl.json && sourceright report .sourceright && sourceright citations docs/paper/manuscript-citations.txt .sourceright"
arxiv-preflight-strict = "python scripts/maintenance/build_manuscript_sources.py && python scripts/maintenance/check_manuscript_citations.py && python scripts/maintenance/build_manuscript_pdf.py --output-dir .tmp/manuscript-build-arxiv --require-pdf --require-arxiv-engine && python scripts/maintenance/build_arxiv_source_package.py && python scripts/maintenance/clean_arxiv_source_package.py && python scripts/maintenance/audit_arxiv_source_privacy.py && sourceright validate-csl --json docs/paper/references.csl.json && sourceright report .sourceright && sourceright citations docs/paper/manuscript-citations.txt .sourceright"
arxiv-upload-ready = "python scripts/maintenance/build_manuscript_sources.py && python scripts/maintenance/check_manuscript_citations.py && python scripts/maintenance/build_manuscript_pdf.py --output-dir .tmp/manuscript-build-arxiv --require-pdf && python scripts/maintenance/build_arxiv_source_package.py && python scripts/maintenance/clean_arxiv_source_package.py && python scripts/maintenance/audit_arxiv_source_privacy.py && sourceright validate-csl --json docs/paper/references.csl.json && sourceright report .sourceright && sourceright citations docs/paper/manuscript-citations.txt .sourceright && python scripts/maintenance/build_arxiv_upload_ready.py --require-privacy-audit"
arxiv-upload-ready-strict = "python scripts/maintenance/build_manuscript_sources.py && python scripts/maintenance/check_manuscript_citations.py && python scripts/maintenance/build_manuscript_pdf.py --output-dir .tmp/manuscript-build-arxiv --require-pdf --require-arxiv-engine && python scripts/maintenance/build_arxiv_source_package.py && python scripts/maintenance/clean_arxiv_source_package.py && python scripts/maintenance/audit_arxiv_source_privacy.py && sourceright validate-csl --json docs/paper/references.csl.json && sourceright report .sourceright && sourceright citations docs/paper/manuscript-citations.txt .sourceright && python scripts/maintenance/build_arxiv_upload_ready.py --require-privacy-audit"
arxiv-strict-review = "python scripts/maintenance/score_arxiv_submission.py --threshold 995"
required-gate = "python scripts/build.py && python scripts/validate.py && pytest && python scripts/maintenance/check_publishing_metadata.py && python scripts/maintenance/check_registry_links.py && python scripts/maintenance/check_manuscript_citations.py && python scripts/maintenance/build_manuscript_pdf.py --require-pdf && pixi run arxiv-upload-ready && python scripts/maintenance/score_arxiv_submission.py --threshold 995"
manuscript-check = "python scripts/maintenance/check_manuscript_citations.py"
manuscript-build = "python scripts/maintenance/check_manuscript_citations.py && python scripts/maintenance/build_manuscript_pdf.py"
manuscript-pdf = "python scripts/maintenance/check_manuscript_citations.py && python scripts/maintenance/build_manuscript_pdf.py --require-pdf"
