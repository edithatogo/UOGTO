<svg xmlns="http://www.w3.org/2000/svg" width="1040" height="560" viewBox="0 0 1040 560" role="img" aria-labelledby="title desc">
<title id="title">PRISMA-style systematic search and ontology enrichment flow</title>
<desc id="desc">Broad source discovery, source-family screening, feature extraction, candidate mapping review, and conservative alignment outcomes for UOGTO.</desc>
<rect width="100%" height="100%" fill="#ffffff"/>
<text x="42" y="42" font-family="Arial,Helvetica,sans-serif" font-size="24" font-weight="700" fill="#334155">PRISMA-style systematic search and ontology enrichment flow</text>
<text x="42" y="72" font-family="Arial,Helvetica,sans-serif" font-size="14" fill="#475569">Broad source discovery, source-family screening, feature extraction, candidate mapping review, and conservative alignment outcomes for UOGTO.</text>
<defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#475569"/></marker></defs>
<rect x="70" y="95" width="230" height="82" rx="8" fill="#F8FAFC" stroke="#0072B2" stroke-width="2"/>
<text x="86" y="122" font-size="14" font-family="Arial,Helvetica,sans-serif" fill="#334155"><tspan x="86" dy="0">Search records/routes</tspan><tspan x="86" dy="18">6 inclusion + 1 negative</tspan><tspan x="86" dy="18">n=7</tspan></text>
<rect x="70" y="215" width="230" height="82" rx="8" fill="#F8FAFC" stroke="#0072B2" stroke-width="2"/>
<text x="86" y="242" font-size="14" font-family="Arial,Helvetica,sans-serif" fill="#334155"><tspan x="86" dy="0">Article-hardening records</tspan><tspan x="86" dy="18">identified and normalized</tspan><tspan x="86" dy="18">n=39</tspan></text>
<rect x="70" y="335" width="230" height="82" rx="8" fill="#F8FAFC" stroke="#0072B2" stroke-width="2"/>
<text x="86" y="362" font-size="14" font-family="Arial,Helvetica,sans-serif" fill="#334155"><tspan x="86" dy="0">Evidence sources retained</tspan><tspan x="86" dy="18">for synthesis</tspan><tspan x="86" dy="18">n=39</tspan></text>
<rect x="405" y="215" width="230" height="82" rx="8" fill="#F8FAFC" stroke="#0072B2" stroke-width="2"/>
<text x="421" y="242" font-size="14" font-family="Arial,Helvetica,sans-serif" fill="#334155"><tspan x="421" dy="0">Comparative source</tspan><tspan x="421" dy="18">families reviewed</tspan><tspan x="421" dy="18">n=21 sources / 17 families</tspan></text>
<rect x="405" y="335" width="230" height="82" rx="8" fill="#F8FAFC" stroke="#0072B2" stroke-width="2"/>
<text x="421" y="362" font-size="14" font-family="Arial,Helvetica,sans-serif" fill="#334155"><tspan x="421" dy="0">Terms normalized</tspan><tspan x="421" dy="18">from UOGTO + sources</tspan><tspan x="421" dy="18">n=4,037</tspan></text>
<rect x="740" y="215" width="230" height="82" rx="8" fill="#F8FAFC" stroke="#0072B2" stroke-width="2"/>
<text x="756" y="242" font-size="14" font-family="Arial,Helvetica,sans-serif" fill="#334155"><tspan x="756" dy="0">Mapping candidates</tspan><tspan x="756" dy="18">reviewed</tspan><tspan x="756" dy="18">n=460</tspan></text>
<rect x="740" y="335" width="230" height="82" rx="8" fill="#F8FAFC" stroke="#0072B2" stroke-width="2"/>
<text x="756" y="362" font-size="14" font-family="Arial,Helvetica,sans-serif" fill="#334155"><tspan x="756" dy="0">Accepted conservative</tspan><tspan x="756" dy="18">alignments</tspan><tspan x="756" dy="18">n=10</tspan></text>
<rect x="740" y="455" width="230" height="82" rx="8" fill="#F8FAFC" stroke="#0072B2" stroke-width="2"/>
<text x="756" y="482" font-size="14" font-family="Arial,Helvetica,sans-serif" fill="#334155"><tspan x="756" dy="0">Needs domain review</tspan><tspan x="756" dy="18">n=1</tspan></text>
<rect x="405" y="455" width="230" height="82" rx="8" fill="#F8FAFC" stroke="#0072B2" stroke-width="2"/>
<text x="421" y="482" font-size="14" font-family="Arial,Helvetica,sans-serif" fill="#334155"><tspan x="421" dy="0">Rejected / non-asserted</tspan><tspan x="421" dy="18">negative evidence</tspan><tspan x="421" dy="18">n=449</tspan></text>
