name: Release Metadata Gate

on:
  push:
    tags: ["v[0-9]+.[0-9]+.[0-9]+"]
  workflow_dispatch:
    inputs:
      tag:
        description: Existing release tag to verify
        required: true
        default: v1.0.0

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout the tagged commit
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.inputs.tag || github.ref_name }}

      - name: Verify exact annotated signed tag
        env:
          EXPECTED_TAG: ${{ github.event.inputs.tag || github.ref_name }}
          EXPECTED_TAGGER_EMAIL: ${{ vars.RELEASE_TAGGER_EMAIL }}
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          test -n "$EXPECTED_TAGGER_EMAIL" || { echo "Repository variable RELEASE_TAGGER_EMAIL is required"; exit 1; }
          git fetch --tags --force origin
          test "$(git rev-parse HEAD)" = "$(git rev-list -n1 "$EXPECTED_TAG")"
          test "$(git cat-file -t "$EXPECTED_TAG")" = tag
          remote_oid="$(git rev-parse "$EXPECTED_TAG^{tag}")"
          tagger_email="$(git for-each-ref --format='%(taggeremail)' "refs/tags/$EXPECTED_TAG")"
          test "$tagger_email" = "<$EXPECTED_TAGGER_EMAIL>"
          verified="$(gh api "repos/${{ github.repository }}/git/tags/$remote_oid" --jq '.verification.verified')"
          test "$verified" = true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies and run release readiness
        run: |
          python -m pip install --upgrade pip
          python -m pip install ".[dev]"
          make release-preflight
