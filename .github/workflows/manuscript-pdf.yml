name: Build Manuscript PDF 
 
on: 
  push: 
    branches: [ main ]
    paths: 
      - "docs/paper/**" 
      - "scripts/maintenance/build_manuscript_pdf.py" 
      - "scripts/maintenance/check_manuscript_citations.py" 
      - "tests/test_manuscript_build.py" 
      - ".github/workflows/manuscript-pdf.yml" 
  pull_request: 
    branches: [ main ]
    paths: 
      - "docs/paper/**" 
      - "scripts/maintenance/build_manuscript_pdf.py" 
      - "scripts/maintenance/check_manuscript_citations.py" 
      - "tests/test_manuscript_build.py" 
      - ".github/workflows/manuscript-pdf.yml" 
  workflow_dispatch: 
 
permissions: 
  contents: read 
 
jobs: 
  manuscript-pdf: 
    runs-on: ubuntu-latest 
    steps: 
      - name: Checkout Repository 
        uses: actions/checkout@v7 
 
      - name: Set up Python 
        uses: actions/setup-python@v6 
        with: 
          python-version: "3.10" 
 
      - name: Install LaTeX toolchain 
        run: | 
          sudo apt-get update 
          sudo apt-get install -y --no-install-recommends latexmk texlive-latex-base texlive-latex-recommended texlive-pictures 
 
      - name: Build manuscript PDF 
        run: make manuscript-pdf
