name: Repository Maintenance

on:
  schedule:
    - cron: '0 0 * * 0' # Run weekly on Sundays
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  validate-and-update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 20

      - name: Setup Pixi
        uses: prefix-dev/setup-pixi@v0.8.1
        with:
          pixi-version: v0.70.2
          cache-write: ${{ github.event_name == 'schedule' }}

      - name: Check Remote Repository Status
        run: pixi run python scripts/maintenance/check_github.py

      - name: Upgrade Dependencies & Verify Health
        run: pixi run python scripts/maintenance/update_dependencies.py

      - name: Generate Auto-Changelog
        run: pixi run python scripts/maintenance/generate_changelog.py

      - name: Check Registry Documentation Links
        run: pixi run python scripts/maintenance/check_registry_links.py --live --allow-unpublished

      - name: Check Zenodo DOI Status
        run: pixi run python scripts/maintenance/check_doi_status.py --live

      - name: Check w3id Pull Request and Redirect Status
        run: pixi run python scripts/maintenance/check_w3id_status.py --live

      - name: Create Maintenance Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "chore: automated repository maintenance"
          title: "chore: automated repository maintenance"
          body: |
            Automated maintenance update generated by the scheduled UOGTO maintenance workflow.

            This run updates dependency state, remote status, changelog entries, and validation reports when changes are produced.
          branch: chore/automated-maintenance
          delete-branch: true
