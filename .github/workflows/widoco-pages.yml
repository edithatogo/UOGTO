name: Build WIDOCO Pages

on:
  push:
    branches: [ main ]
    tags: [ "v*" ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

env:
  WIDOCO_VERSION: v1.4.25
  WIDOCO_JAR_URL: https://github.com/dgarijo/Widoco/releases/download/v1.4.25/widoco-1.4.25-jar-with-dependencies_JDK-17.jar
  WIDOCO_JAR_SHA256: be57a270fffb91e55810fa308717e704a44e2e7c027a3d68125a49da6c8b4e2b

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install ".[dev]"

      - name: Run publishing release gates
        run: |
          make build
          make validate
          make test
          python scripts/maintenance/audit_semantics.py
          make publishing-metadata

      - name: Download pinned WIDOCO release
        run: |
          python - <<'PY'
          import hashlib
          import os
          import urllib.request

          jar_url = os.environ["WIDOCO_JAR_URL"]
          expected = os.environ["WIDOCO_JAR_SHA256"]
          print(jar_url)
          urllib.request.urlretrieve(jar_url, "widoco.jar")
          actual = hashlib.sha256(open("widoco.jar", "rb").read()).hexdigest()
          if actual != expected:
              raise SystemExit(f"WIDOCO checksum mismatch: expected {expected}, got {actual}")
          PY

      - name: Generate WIDOCO HTML
        run: |
          mkdir -p site
          java -jar widoco.jar \
            -ontFile dist/uogto.ttl \
            -outFolder site \
            -rewriteAll \
            -getOntologyMetadata \
            -webVowl \
            -uniteSections
          if [ ! -f site/index.html ] && [ -f site/index-en.html ]; then
            cp site/index-en.html site/index.html
          fi
          touch site/.nojekyll

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: site

  deploy:
    needs: build
    if: ${{ vars.ENABLE_PAGES_DEPLOY == 'true' }}
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
