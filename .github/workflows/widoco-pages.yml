name: Build WIDOCO Pages

on:
  push:
    branches: [ main ]
    tags: [ "v*" ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

env:
  WIDOCO_VERSION: v1.4.25
  WIDOCO_SHA256: ce3071a90fe73c0860829569e79050f74c9623d6add8be3925cbdf87bedde5a5

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install .

      - name: Run publishing release gates
        run: |
          make build
          make validate
          make test
          python scripts/maintenance/audit_semantics.py
          make publishing-metadata

      - name: Download pinned WIDOCO release
        run: |
          python - <<'PY'
          import json
          import hashlib
          import os
          import urllib.request

          version = os.environ["WIDOCO_VERSION"]
          expected_sha256 = os.environ["WIDOCO_SHA256"]
          release_url = f"https://api.github.com/repos/dgarijo/Widoco/releases/tags/{version}"
          with urllib.request.urlopen(release_url) as response:
              release = json.load(response)

          if release.get("tag_name") != version:
              raise SystemExit(f"Expected WIDOCO {version}, got {release.get('tag_name')}")

          jar_url = None
          for asset in release.get("assets", []):
              name = asset.get("name", "")
              if name.endswith(".jar") and "dependencies" in name.lower():
                  jar_url = asset["browser_download_url"]
                  break

          if not jar_url:
              raise SystemExit("Could not find a WIDOCO dependencies JAR in the latest release assets")

          print(jar_url)
          urllib.request.urlretrieve(jar_url, "widoco.jar")
          actual_sha256 = hashlib.sha256(open("widoco.jar", "rb").read()).hexdigest()
          if actual_sha256 != expected_sha256:
              raise SystemExit(f"WIDOCO checksum mismatch: expected {expected_sha256}, got {actual_sha256}")
          PY

      - name: Generate WIDOCO HTML
        run: |
          mkdir -p site
          java -jar widoco.jar \
            -ontFile dist/uogto.ttl \
            -outFolder site \
            -rewriteAll \
            -getOntologyMetadata \
            -webVowl \
            -uniteSections
          if [ ! -f site/index.html ] && [ -f site/index-en.html ]; then
            cp site/index-en.html site/index.html
          fi
          touch site/.nojekyll

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: site

  deploy:
    needs: build
    if: ${{ vars.ENABLE_PAGES_DEPLOY == 'true' }}
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
