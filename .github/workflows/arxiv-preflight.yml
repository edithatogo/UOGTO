name: arXiv Preflight

on:
  push:
    branches: [ main, master ]
    paths:
      - "docs/paper/**"
      - "scripts/maintenance/build_arxiv_source_package.py"
      - "scripts/maintenance/clean_arxiv_source_package.py"
      - "scripts/maintenance/build_manuscript_pdf.py"
      - "scripts/maintenance/check_manuscript_citations.py"
      - "scripts/maintenance/build_manuscript_sources.py"
      - "tests/test_arxiv_source_package.py"
      - ".github/workflows/arxiv-preflight.yml"
  pull_request:
    branches: [ main, master ]
    paths:
      - "docs/paper/**"
      - "scripts/maintenance/build_arxiv_source_package.py"
      - "scripts/maintenance/clean_arxiv_source_package.py"
      - "scripts/maintenance/build_manuscript_pdf.py"
      - "scripts/maintenance/check_manuscript_citations.py"
      - "scripts/maintenance/build_manuscript_sources.py"
      - "tests/test_arxiv_source_package.py"
      - ".github/workflows/arxiv-preflight.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  arxiv-preflight:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install .
          cargo install --git https://github.com/edithatogo/sourceright.git --locked

      - name: Install LaTeX toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends latexmk texlive-latex-base texlive-latex-recommended

      - name: Run arXiv source package tests
        run: pytest tests/test_arxiv_source_package.py

      - name: Run arXiv preflight
        run: make arxiv-preflight
